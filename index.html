<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Pedagógica N° 1 "Pueblo de Rawson"</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1a3a5c;
    --azul-medio: #2563a8;
    --azul-claro: #dbeafe;
    --acento: #e8a020;
    --fondo: #f0f4f8;
    --card-bg: #ffffff;
    --texto: #1e2d3d;
    --texto-suave: #5a7080;
    --borde: #d0dce8;
    --success: #25D366;
    --danger: #e74c3c;
    --sombra: 0 2px 12px rgba(26,58,92,0.10);
  }
  [data-theme="dark"] {
    --azul: #1e3a5f;
    --azul-medio: #3b82c4;
    --azul-claro: #1e3a5f;
    --acento: #f0b429;
    --fondo: #101c2c;
    --card-bg: #162133;
    --texto: #e8f0f8;
    --texto-suave: #8aadcc;
    --borde: #1e3a5f;
    --sombra: 0 2px 12px rgba(0,0,0,0.35);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    transition: background 0.3s, color 0.3s;
    min-height: 100vh;
    padding-bottom: 80px;
  }
  .header {
    background: linear-gradient(135deg, #0d1f35 0%, #1a3a5c 100%);
    color: white;
    padding: 1.25rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
  }
  .header-top {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 0.75rem;
  }
  .btn-tema {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
  }
  .logo-wrap {
    margin: 0 auto 0.75rem;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255,255,255,0.25);
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 0.2rem;
  }
  .header p { font-size: 13px; opacity: 0.75; margin-bottom: 1rem; }
  .header-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--success);
    color: white;
    padding: 9px 18px;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 3px 12px rgba(37,211,102,0.35);
    transition: transform 0.15s;
  }
  .btn-whatsapp:hover { transform: translateY(-1px); }
  .btn-mail {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 9px 18px;
    border-radius: 25px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
  }
  .btn-mail:hover { background: rgba(255,255,255,0.25); }
  .redes { display: flex; gap: 10px; justify-content: center; margin-top: 0.75rem; }
  .red-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    text-decoration: none;
    transition: transform 0.15s, opacity 0.15s;
    opacity: 0.85;
  }
  .red-btn:hover { transform: scale(1.15); opacity: 1; }
  .red-fb { background: #1877f2; }
  .red-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .buscador-wrap {
    background: var(--card-bg);
    border-bottom: 1px solid var(--borde);
    padding: 1rem 1.25rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--sombra);
  }
  .buscador-input {
    flex: 1;
    min-width: 180px;
    padding: 9px 14px;
    border: 1.5px solid var(--borde);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    outline: none;
    transition: border-color 0.2s;
  }
  .buscador-input:focus { border-color: var(--azul-medio); }
  .buscador-select {
    padding: 9px 12px;
    border: 1.5px solid var(--borde);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Source Sans 3', sans-serif;
    background: var(--fondo);
    color: var(--texto);
    cursor: pointer;
    outline: none;
  }
  .stats-bar {
    background: var(--azul);
    color: white;
    text-align: center;
    padding: 0.6rem;
    font-size: 13px;
    display: none;
  }
  .progress-wrap { padding: 3rem 1.5rem; text-align: center; }
  .progress-label { font-size: 15px; color: var(--texto-suave); margin-bottom: 1rem; }
  .progress-bg { background: var(--borde); border-radius: 99px; height: 8px; max-width: 360px; margin: 0 auto; overflow: hidden; }
  .progress-fill { height: 8px; border-radius: 99px; background: var(--azul-medio); width: 0%; transition: width 0.4s; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 1rem;
    padding: 1.25rem;
  }
  .card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 1.1rem;
    box-shadow: var(--sombra);
    border: 1px solid var(--borde);
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,58,92,0.15); }
  .card-titulo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--azul);
    line-height: 1.35;
    padding-right: 28px;
  }
  [data-theme="dark"] .card-titulo { color: var(--azul-medio); }
  .card-autor { font-size: 13px; color: var(--texto-suave); font-weight: 500; }
  .card-meta { font-size: 12px; color: var(--texto-suave); }
  .card-temas { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
  .tema-tag {
    background: var(--azul-claro);
    color: var(--azul-medio);
    font-size: 11px;
    padding: 2px 9px;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tema-tag:hover { background: var(--azul-medio); color: white; }
  .card-inv { font-size: 11px; color: #aaa; margin-top: 4px; }
  .card-isbn { font-size: 11px; color: #aaa; }
  .card-portada {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 0.5rem;
    background: var(--fondo);
  }
  .card-portada-placeholder {
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    background: var(--fondo);
    border-radius: 8px;
    margin-bottom: 0.5rem;
  }
  .btn-favorito {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    color: #ccc;
    transition: color 0.15s, transform 0.15s;
  }
  .btn-favorito.activo { color: var(--danger); }
  .btn-favorito:hover { transform: scale(1.2); }
  .btn-ficha {
    margin-top: 6px;
    background: none;
    border: 1px solid var(--borde);
    color: var(--azul-medio);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: background 0.15s;
    align-self: flex-start;
  }
  .btn-ficha:hover { background: var(--azul-claro); }
  mark { background: #ffe066; border-radius: 3px; padding: 0 2px; }
  .ver-mas { text-align: center; padding: 1.5rem; display: none; }
  .ver-mas button {
    background: var(--azul);
    color: white;
    border: none;
    padding: 11px 32px;
    border-radius: 25px;
    font-size: 15px;
    font-family: 'Source Sans 3', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .ver-mas button:hover { background: var(--azul-medio); }
  .sin-resultados { text-align: center; padding: 3rem; color: var(--texto-suave); font-size: 15px; display: none; }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.abierto { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 1.5rem;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
  }
  .modal h3 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--azul); margin-bottom: 1rem; padding-right: 30px; }
  [data-theme="dark"] .modal h3 { color: var(--azul-medio); }
  .modal-field { margin-bottom: 0.6rem; font-size: 14px; }
  .modal-label { font-weight: 600; color: var(--texto-suave); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .modal-valor { color: var(--texto); }
  .modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--texto-suave); }
  .panel-favoritos {
    position: fixed;
    bottom: 85px;
    right: 16px;
    background: var(--card-bg);
    border: 1px solid var(--borde);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    width: 300px;
    max-height: 400px;
    overflow-y: auto;
    z-index: 150;
    display: none;
    padding: 1rem;
  }
  .panel-favoritos h4 { font-size: 14px; font-weight: 600; margin-bottom: 0.75rem; color: var(--texto); }
  .fav-item { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--borde); color: var(--texto); }
  .fav-acciones { display: flex; gap: 8px; margin-top: 0.75rem; flex-wrap: wrap; }
  .fav-btn { flex: 1; padding: 7px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-weight: 500; }
  .fav-btn-wa { background: var(--success); color: white; }
  .fav-btn-clear { background: var(--fondo); color: var(--texto-suave); border: 1px solid var(--borde); }
  .fab-favoritos {
    position: fixed;
    bottom: 90px;
    right: 16px;
    background: var(--danger);
    color: white;
    border: none;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 140;
    position: fixed;
  }
  .fab-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--acento);
    color: white;
    font-size: 11px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--azul);
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 0.6rem 1rem;
    font-size: 12px;
    z-index: 100;
  }
  .footer a { color: var(--acento); text-decoration: none; }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .buscador-wrap { flex-direction: column; }
    .panel-favoritos { width: calc(100vw - 32px); right: 16px; }
    .header-btns { flex-direction: column; align-items: center; }
  }
</style>
</head>

    const p = b.split('|').map(x => fixEncoding(x.trim()));
    // Formato: inventario | autor | titulo | lugar | editorial | año | temas | isbn
    // Limpiar comillas de todos los campos (artefacto de WinISIS)
    const limpiar = s => (s || '').replace(/'/g, '').trim();

    // Inventario: puede ser "010000', '010001" → limpiar y separar por coma
    const invRaw = limpiar(p[0]);
    const inventario = invRaw
      .split(',')
      .map(i => i.trim())
      .filter(i => i.length > 0)
      .join(', ');

    const autor      = limpiar(p[1]);
    const titulo     = limpiar(p[2]);
    const lugar      = limpiar(p[3]);
    const editorial  = limpiar(p[4]);
    const anio       = limpiar(p[5]).replace(/\D/g, '').slice(0, 4);
    const temasRaw   = limpiar(p[6]);
    const isbn       = limpiar(p[7]);

    // Separar temas por ;; y filtrar vacíos
    const temas = temasRaw
      .split(';;')
      .map(t => t.trim())
      .filter(t => t.length > 2);

    return { inventario, autor, titulo, lugar, editorial, anio, temas, isbn };
  }).filter(r => r.titulo.length > 0);
}

function resaltar(texto, termino) {
  if (!termino) return texto;
  const re = new RegExp('(' + termino.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return texto.replace(re, '<mark>$1</mark>');
}

function crearTarjeta(r, termino) {
  const esFav = favoritos.some(f => f.inventario === r.inventario && f.titulo === r.titulo);
  const idx = todos.indexOf(r);
  const temasHTML = r.temas.slice(0, 5).map(t =>
    `<span class="tema-tag" onclick="filtrarPorTema('${t.replace(/'/g,"\\'")}')">` + resaltar(t, termino) + `</span>`
  ).join('');
  // Obtener primer número de inventario para buscar la portada
  const invPrimero = r.inventario ? r.inventario.split(',')[0].trim() : '';
  const urlBase = 'https://raw.githubusercontent.com/bip1rw-droid/catalogobp1/main/tapas/';
  const portadaHTML = invPrimero ? `
    <img class="card-portada"
      src="${urlBase}${invPrimero}.webp"
      alt="Portada"
      onerror="this.src='${urlBase}${invPrimero}.jpg';this.onerror=function(){this.src='${urlBase}${invPrimero}.png';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex';};};"
    >
    <div class="card-portada-placeholder" style="display:none">📖</div>` : '<div class="card-portada-placeholder">📖</div>';

  return `<div class="card" id="card-${idx}">
    <button class="btn-favorito ${esFav?'activo':''}" onclick="toggleFavorito(${idx})">${esFav?'❤️':'🤍'}</button>
    ${portadaHTML}
    <div class="card-titulo">${resaltar(r.titulo, termino)}</div>
    ${r.autor ? `<div class="card-autor">✍️ ${resaltar(r.autor, termino)}</div>` : ''}
    <div class="card-meta">${r.editorial?`📖 ${r.editorial}`:''}${r.lugar?` · ${r.lugar}`:''}${r.anio?` · ${r.anio}`:''}</div>
    ${temasHTML ? `<div class="card-temas">${temasHTML}</div>` : ''}
    ${r.isbn ? `<div class="card-isbn">ISBN: ${r.isbn}</div>` : ''}
    ${r.inventario ? `<div class="card-inv">N° inv: ${r.inventario}</div>` : ''}
    <button class="btn-ficha" onclick="abrirModal(${idx})">Ver ficha completa</button>
  </div>`;
}

function mostrarMas() {
  const grid = document.getElementById('grid');
  const termino = document.getElementById('inputBuscar').value.trim();
  const siguiente = Math.min(mostrados + POR_VEZ, filtrados.length);
  for (let i = mostrados; i < siguiente; i++) grid.insertAdjacentHTML('beforeend', crearTarjeta(filtrados[i], termino));
  mostrados = siguiente;
  document.getElementById('verMas').style.display = mostrados < filtrados.length ? 'block' : 'none';
}

function normalizar(str) {
  return (str || '').toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '');
}

function buscar() {
  const termino = normalizar(document.getElementById('inputBuscar').value.trim());
  const campo = document.getElementById('filtroCampo').value;
  filtrados = todos.filter(r => {
    if (!termino) return true;
    if (campo === 'titulo') return normalizar(r.titulo).includes(termino);
    if (campo === 'autor') return normalizar(r.autor).includes(termino);
    if (campo === 'tema') return r.temas.some(t => normalizar(t).includes(termino));
    if (campo === 'inventario') return normalizar(r.inventario).includes(termino);
    return normalizar(r.titulo+r.autor+r.temas.join(' ')+r.inventario).includes(termino);
  });
  document.getElementById('grid').innerHTML = '';
  mostrados = 0;
  document.getElementById('sinResultados').style.display = filtrados.length === 0 ? 'block' : 'none';
  actualizarStats();
  mostrarMas();
}

function filtrarPorTema(tema) {
  document.getElementById('inputBuscar').value = tema;
  document.getElementById('filtroCampo').value = 'tema';
  buscar();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function actualizarStats() {
  document.getElementById('statsBar').textContent = `📚 ${filtrados.length} de ${todos.length} registros`;
}

function abrirModal(idx) {
  const r = todos[idx];
  document.getElementById('modalTitulo').textContent = r.titulo;
  document.getElementById('modalContenido').innerHTML = [
    ['Autor', r.autor], ['Editorial', r.editorial], ['Lugar', r.lugar],
    ['Año', r.anio], ['Temas', r.temas.join(' / ')], ['ISBN', r.isbn], ['N° Inventario', r.inventario]
  ].filter(([,v]) => v).map(([l,v]) =>
    `<div class="modal-field"><div class="modal-label">${l}</div><div class="modal-valor">${v}</div></div>`
  ).join('');
  document.getElementById('modalOverlay').classList.add('abierto');
}

function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('abierto');
}

function toggleFavorito(idx) {
  const r = todos[idx];
  const pos = favoritos.findIndex(f => f.inventario === r.inventario && f.titulo === r.titulo);
  if (pos >= 0) favoritos.splice(pos, 1);
  else favoritos.push({ inventario: r.inventario, titulo: r.titulo, autor: r.autor });
  localStorage.setItem('bp1_favoritos', JSON.stringify(favoritos));
  actualizarFavoritos();
  const card = document.getElementById('card-' + idx);
  if (card) {
    const btn = card.querySelector('.btn-favorito');
    const esFav = pos < 0;
    btn.textContent = esFav ? '❤️' : '🤍';
    btn.className = 'btn-favorito' + (esFav ? ' activo' : '');
  }
}

function actualizarFavoritos() {
  const fab = document.getElementById('fabFavoritos');
  document.getElementById('fabBadge').textContent = favoritos.length;
  fab.style.display = favoritos.length > 0 ? 'flex' : 'none';
  document.getElementById('listaFavoritos').innerHTML = favoritos.map(f =>
    `<div class="fav-item">📖 ${f.titulo}${f.autor?' — '+f.autor:''}</div>`
  ).join('') || '<div style="color:#aaa;font-size:13px">Todavía no tenés favoritos.</div>';
}

function togglePanel() {
  const p = document.getElementById('panelFavoritos');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function enviarWA() {
  const lista = favoritos.map(f => `• ${f.titulo}${f.autor?' ('+f.autor+')':''}`).join('\n');
  window.open('https://wa.me/542804220877?text=' + encodeURIComponent(`Hola! Me interesan estos libros:\n${lista}\n\n¿Están disponibles?`), '_blank');
}

function limpiarFavoritos() {
  favoritos = [];
  localStorage.setItem('bp1_favoritos', '[]');
  actualizarFavoritos();
  document.getElementById('panelFavoritos').style.display = 'none';
  document.querySelectorAll('.btn-favorito').forEach(b => { b.textContent = '🤍'; b.classList.remove('activo'); });
}

async function cargar() {
  try {
    setProgress(20, 'Conectando con GitHub...');
    const res = await fetch(URL_CATALOGO + '?t=' + Date.now());
    if (!res.ok) throw new Error('código ' + res.status);
    setProgress(55, 'Leyendo registros MARC21...');
    const buffer = await res.arrayBuffer();
    let texto;
    try {
      texto = new TextDecoder('utf-8').decode(buffer);
      if (texto.includes('\uFFFD')) texto = new TextDecoder('windows-1252').decode(buffer);
    } catch(e) {
      texto = new TextDecoder('windows-1252').decode(buffer);
    }
    setProgress(80, 'Procesando registros...');
    todos = parsearRegistros(texto);
    filtrados = [...todos];
    setProgress(100, 'Listo');
    setTimeout(() => {
      document.getElementById('progressWrap').style.display = 'none';
      document.getElementById('buscadorWrap').style.display = 'flex';
      document.getElementById('statsBar').style.display = 'block';
      actualizarStats();
      actualizarFavoritos();
      mostrarMas();
    }, 350);
  } catch(e) {
    document.getElementById('progressWrap').innerHTML = `<p style="color:#e74c3c;font-size:15px">❌ Error: ${e.message}</p>`;
  }
}

cargar();
</script>
